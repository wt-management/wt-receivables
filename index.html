<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>미수금 관리 · 국내</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23b45309'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>₩</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#f6f7f9;--card:#fff;--line:#e8ebf0;--line2:#f1f3f5;--ink:#0f172a;--body:#475569;--muted:#94a3b8;--brand:#b45309;--ok:#15803d;--bad:#b91c1c;--sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05)}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:light}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--body);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.1px;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}
#load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f6f7f9;color:#64748b;font-size:14px;z-index:50}
#app{display:none}
/* 상단 헤더(일보 스타일) */
.hdr{position:sticky;top:0;z-index:40;background:#0f172a;color:#fff}
.hdr-in{max-width:none;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.brand .lg{width:37px;height:37px;border-radius:10px;background:linear-gradient(135deg,#d97706,#b45309);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 5px 14px rgba(180,83,9,.35)}
.brand b{color:#fff;font-size:14.5px;font-weight:800;display:block;line-height:1.1}.brand small{display:block;color:#64748b;font-size:10.5px;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:9px;margin-left:auto}
.hbtn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:9px;padding:8px 12px;color:#e2e8f0;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.hbtn:hover{background:rgba(255,255,255,.16)}
.acctbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:4px 11px 4px 4px;display:flex;align-items:center;gap:8px;color:#fff}
.acctbtn:hover{background:rgba(255,255,255,.12)}
.acctbtn .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.acctbtn .who{text-align:left;line-height:1.2}.acctbtn .nm{font-size:12px;font-weight:700;color:#f1f5f9;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.acctbtn .em{font-size:10px;color:#94a3b8;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sw-wrap{position:relative}
.dd{display:none;position:absolute;top:122%;right:0;background:#1e293b;border:1px solid #334155;border-radius:12px;box-shadow:0 16px 42px rgba(0,0,0,.5);z-index:50;padding:6px;min-width:220px}
.dd.open{display:block}
.dd>button{width:100%;text-align:left;background:transparent;border:0;border-radius:8px;padding:9px 11px;font-size:13px;color:#cbd5e1;font-weight:600;display:flex;align-items:center;gap:8px;cursor:pointer}
.dd>button:hover{background:rgba(255,255,255,.08);color:#fff}
.sw-item{border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:9px;color:#94a3b8;font-size:12.5px;cursor:pointer;font-weight:600}
.sw-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sw-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:19px;color:#fff;border-radius:6px;font-size:10px;font-weight:700;padding:0 5px;flex-shrink:0}
.nav{max-width:none;margin:0 auto;padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;border-top:1px solid rgba(255,255,255,.08)}
.nav::-webkit-scrollbar{display:none}
.nav a{display:flex;align-items:center;gap:7px;padding:11px 14px 12px;font-size:13.5px;font-weight:600;color:#94a3b8;border-bottom:2.5px solid transparent;white-space:nowrap;cursor:pointer;text-decoration:none}
.nav a .ico{font-size:15px}
.nav a:hover{color:#fff}
.nav a.active{color:#fff;border-bottom-color:#f59e0b}
/* 메인 */
#main{max-width:none;min-height:60vh}
.pagetitle{padding:22px 24px 2px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pagetitle h2{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
.pagetitle .desc{color:var(--muted);font-size:12.5px;margin-top:4px}
.wrap{padding:22px 30px 60px}
.sec{font-size:15px;font-weight:700;color:var(--ink);margin:6px 0 14px;display:flex;align-items:center;gap:8px}
.hint{font-size:11.5px;color:var(--muted);font-weight:500}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--sh)}
.kpi.clk{cursor:pointer}.kpi.clk:hover{border-color:#cbd5e1}
.kpi .l{font-size:11.5px;color:var(--muted);font-weight:500}
.kpi .v{font-size:22px;font-weight:800;color:var(--ink);margin-top:6px;line-height:1}
.kpi .s{font-size:11px;margin-top:6px;font-weight:600;color:var(--muted)}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--sh);margin-bottom:18px}
.up{color:var(--ok)}.dn{color:var(--bad)}.mut{color:var(--muted)}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--body);box-shadow:var(--sh)}
.btn:hover{border-color:#cbd5e1}
.btn.pri{background:#0f172a;color:#fff;border-color:#0f172a}
.btn.warn{background:#b45309;color:#fff;border-color:#b45309}
.sel,.inp{border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12.5px;background:#fff;color:var(--body)}
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap}
.bar-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
/* 표 */
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.dt{width:100%;border-collapse:collapse;font-size:12.5px}
.dt th,.dt td{border-bottom:1px solid var(--line2);padding:8px 10px;text-align:right;white-space:nowrap}
.dt th{color:var(--muted);font-weight:600;font-size:11px;background:#fafbfc;position:sticky;top:0}
.dt th.sortable{cursor:pointer}.dt th.sortable:hover{color:var(--ink)}
.dt td.l,.dt th.l{text-align:left}
.dt td.l b{color:var(--ink);font-weight:600}
.dt tr.clk{cursor:pointer}.dt tr.clk:hover td{background:#fdf8f1}
.dt .memo{max-width:260px;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
table.rt{width:100%;border-collapse:collapse;font-size:12.5px;min-width:700px}
.rt th,.rt td{border:1px solid var(--line);padding:7px 10px;text-align:right;white-space:nowrap}
.rt thead th{background:#eef2f6;color:#475569;font-weight:700;font-size:11.5px;text-align:center}
.rt td.lbl,.rt th.lbl{text-align:left}
.rt tr.grand td{background:#0f172a;color:#fff;font-weight:800}
.rt tr.hl:hover td{background:#fdf8f1;cursor:pointer}
/* 모달 */
.modal{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:70;padding:24px}
.modal.open{display:flex}
.mbox{background:#fff;border-radius:18px;width:min(760px,100%);max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.mhd{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 22px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
.mhd h3{font-size:17px;color:var(--ink);font-weight:800}
.mhd .x{border:0;background:#f1f3f5;width:30px;height:30px;border-radius:8px;color:#64748b;font-size:16px;flex-shrink:0}
.mbody{padding:18px 22px 24px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px 16px;margin-bottom:14px}
.fld label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}
.fld .fv{font-size:13px;color:var(--ink);font-weight:600;word-break:break-all}
.fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12.5px}
.fld textarea{resize:vertical;min-height:56px}
.editable-note{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:12px;color:#92400e;margin-bottom:14px}
/* 로그인 */
#login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a,#292018);z-index:60;padding:16px}
.lc{background:#fff;border-radius:18px;padding:40px 34px;width:350px;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35)}
.lc h1{font-size:18px;text-align:center;color:#0f172a}.lc .sub{text-align:center;color:#94a3b8;font-size:13px;margin:4px 0 22px}
.lc input{width:100%;padding:12px 14px;border:1px solid #e8ebf0;border-radius:10px;margin-bottom:11px}
.lc button{width:100%;padding:12px;border:0;border-radius:10px;background:#b45309;color:#fff;font-weight:700}
#login-err{color:#b91c1c;font-size:12.5px;text-align:center;margin-top:10px;display:none}
/* 토스트 */
#toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:99;display:none;box-shadow:0 10px 30px rgba(0,0,0,.3)}
/* 임원 보고(인쇄) */
.rpt{max-width:none}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;align-items:start}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;align-items:start}
@media(max-width:1150px){.rpt-grid,.qa-grid{display:block}}
@media print{.rpt-grid,.qa-grid{display:block}}
.rpt h1{font-size:20px;color:var(--ink);text-align:center;margin-bottom:2px}
.rpt .sub{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:22px}
.rpt h4{font-size:14.5px;color:var(--ink);margin:22px 0 10px;padding-left:9px;border-left:4px solid var(--brand)}
.rpt .sumline{font-size:13px;color:var(--ink);padding:6px 0;line-height:1.55}
.rpt .concl{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:13px;color:var(--ink);font-weight:600;line-height:1.6;margin-top:18px}
@media print{
  .hdr,.pagetitle .actions,#pdf-fab,#wt-fb-btn,#wt-fb-panel,.noprint{display:none!important}
  body{background:#fff}
  .wrap{padding:0}
  .card{border:0;box-shadow:none;padding:8px 0}
  #main{max-width:100%}
}
#pdf-fab{position:fixed;right:18px;bottom:18px;z-index:9990;background:#0f172a;color:#fff;border:0;border-radius:24px;padding:10px 16px;font-size:12.5px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px}
canvas.chart{max-height:300px}
/* 조치 필요(액션) 카드 */
.acts{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));margin-bottom:16px}
.act{background:#fff;border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:12px;padding:12px 14px;box-shadow:var(--sh);cursor:pointer}
.act:hover{border-color:#cbd5e1;border-left-color:var(--brand)}
.act .t{font-size:12px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px}
.act .n{font-size:19px;font-weight:800;color:var(--ink);margin-top:5px}
.act .d{font-size:11px;color:var(--muted);margin-top:3px}
/* 진행률 바 */
.prog{height:10px;background:#f1f5f9;border-radius:6px;overflow:hidden;margin:6px 0}
.prog>div{height:100%;border-radius:6px;background:#2563eb}
/* 주간 변동 배지 */
.delta-pill{display:inline-flex;align-items:center;gap:4px;border-radius:8px;padding:3px 9px;font-size:11.5px;font-weight:700}
/* Q&A */
.qa{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
.qa summary{padding:10px 14px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;background:#fafbfc;list-style:none}
.qa summary::before{content:'Q. '}
.qa .a{padding:10px 14px;font-size:12.5px;line-height:1.65;color:var(--body);border-top:1px solid var(--line2)}
@media print{.qa{page-break-inside:avoid}.qa[open] summary{background:#fff}.rpt h4{page-break-after:avoid}.rt{page-break-inside:avoid}details.qa{display:block}.card{page-break-inside:auto}}
@media(max-width:820px){
  .hdr-in{padding:10px 14px;gap:10px}
  .brand small{display:none}
  .acctbtn .who{display:none}
  .nav{padding:0 8px}.nav a{padding:10px 11px;font-size:12.5px}
  .pagetitle{padding:16px 14px 2px}.wrap{padding:14px 14px 60px}
  body{overflow-x:hidden}
  .card{padding:14px}
  .modal{padding:0}
  .mbox{width:100%;height:100%;max-height:100%;border-radius:0}
  .fgrid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .brand b{font-size:13px}
  .hbtn{padding:7px 9px;font-size:11.5px}
  .pagetitle h2{font-size:19px}
  .kpi{padding:12px 13px}
  .kpi .v{font-size:19px}
  .card{padding:12px}
  .sec{font-size:14px}
  .bar-row{gap:8px}
  .bar-row .inp,.bar-row .sel{flex:1 1 140px}
  .fgrid{grid-template-columns:1fr}
  .mhd{padding:16px 16px 12px}.mbody{padding:14px 16px 18px}
}
</style>
<script>/* WT_ERRLOG_V1 — 공통 오류수집+요청함 (자동주입 스니펫, 개별 수정 금지) */
(function(){
var U='https://mhfacbsittfdkknwybhc.supabase.co/rest/v1/';
var K='sb_publishable_aPMOOWAlyJlMcP1ZM_gpPA_jlrcvCRd';
var SITE=(location.pathname.split('/')[1]||'root');
var PAGE=(location.pathname.split('/').slice(2).join('/')||'index.html');
function wtPost(t,b){try{fetch(U+t,{method:'POST',headers:{'apikey':K,'Authorization':'Bearer '+K,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(b)});}catch(e){}}
function wtEmail(){try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('sb-')===0&&k.indexOf('auth-token')>-1){var v=JSON.parse(localStorage.getItem(k)||'{}');return (v.user&&v.user.email)||(v.currentSession&&v.currentSession.user&&v.currentSession.user.email)||'';}}}catch(e){}return '';}
var wtSeen={},wtN=0;
window.addEventListener('error',function(e){if(!e||!e.message)return;var key=e.message+'|'+(e.filename||'')+'|'+e.lineno;if(wtSeen[key]||wtN>=10)return;wtSeen[key]=1;wtN++;wtPost('site_errors',{site:SITE,page:PAGE,href:location.href.slice(0,500),message:String(e.message).slice(0,500),source:String(e.filename||'').slice(0,300),line:e.lineno||null,col:e.colno||null,stack:(e.error&&e.error.stack)?String(e.error.stack).slice(0,1500):null,ua:navigator.userAgent.slice(0,300),user_email:wtEmail()||null});},true);
window.addEventListener('unhandledrejection',function(e){var r=(e&&e.reason)||{};var m=('unhandledrejection: '+(r.message||String(r))).slice(0,500);if(wtSeen[m]||wtN>=10)return;wtSeen[m]=1;wtN++;wtPost('site_errors',{site:SITE,page:PAGE,href:location.href.slice(0,500),message:m,stack:r.stack?String(r.stack).slice(0,1500):null,ua:navigator.userAgent.slice(0,300),user_email:wtEmail()||null});});
function wtFb(){
if(document.getElementById('wt-fb-btn'))return;
var b=document.createElement('div');b.id='wt-fb-btn';b.textContent='🙋 요청·신고';
b.style.cssText='position:fixed;right:18px;bottom:64px;z-index:99990;background:#334155;color:#e2e8f0;padding:7px 13px;border-radius:20px;font-size:12px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);font-family:inherit;user-select:none;opacity:.85';
b.onmouseover=function(){b.style.opacity='1';};b.onmouseout=function(){b.style.opacity='.85';};
var p=document.createElement('div');p.id='wt-fb-panel';
p.style.cssText='display:none;position:fixed;right:18px;bottom:108px;z-index:99991;width:min(320px,90vw);background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;box-shadow:0 12px 32px rgba(0,0,0,.5);font-family:inherit';
p.innerHTML='<div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:8px">요청 · 불편신고</div><textarea id="wt-fb-msg" placeholder="불편한 점이나 요청사항을 적어주세요" style="width:100%;height:88px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:12px;padding:8px;resize:none;box-sizing:border-box"></textarea><div style="display:flex;gap:8px;margin-top:8px;justify-content:flex-end"><button id="wt-fb-cancel" style="background:none;border:1px solid #475569;color:#94a3b8;padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer">닫기</button><button id="wt-fb-send" style="background:#0d9488;border:none;color:#fff;padding:5px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600">전송</button></div>';
document.body.appendChild(b);document.body.appendChild(p);
b.onclick=function(){p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block'){var t=document.getElementById('wt-fb-msg');if(t)t.focus();}};
document.getElementById('wt-fb-cancel').onclick=function(){p.style.display='none';};
document.getElementById('wt-fb-send').onclick=function(){var t=document.getElementById('wt-fb-msg');var m=(t&&t.value||'').trim();if(!m)return;wtPost('site_feedback',{site:SITE,page:PAGE,message:m.slice(0,2000),reporter:wtEmail()||null});p.innerHTML='<div style="color:#5eead4;font-size:13px;text-align:center;padding:14px 4px">접수되었습니다! 감사합니다 🙏</div>';setTimeout(function(){p.style.display='none';p.remove();b.remove();wtFb();},1600);};
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',wtFb);}else{wtFb();}
})();</script>

<body>
<div id="load"><i class="bi bi-arrow-repeat" style="margin-right:8px"></i>불러오는 중...</div>

<div id="login"><div class="lc"><h1>💰 국내 미수금 관리</h1><div class="sub">국내영업 채권 현황</div>
  <input id="li" type="email" placeholder="이메일" onkeydown="if(event.key==='Enter')doLogin()"><input id="lp" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">로그인</button><div id="login-err">이메일 또는 비밀번호가 올바르지 않습니다.</div></div></div>

<div id="app">
  <header class="hdr">
    <div class="hdr-in">
      <div class="brand"><div class="lg">💰</div><div><b>국내 미수금 관리</b><small id="hdr-asof">국내영업 채권 현황</small></div></div>
      <div class="hdr-r">
        <div class="sw-wrap"><button class="hbtn" onclick="ddToggle('swdd')"><i class="bi bi-grid-3x3-gap-fill"></i> 사이트 이동</button>

function listRows(){
  let a=E.slice();
  if(_f.hasAr)a=a.filter(r=>r.ar>0);

  if(_f.year)a=a.filter(r=>String(r.year)===_f.year);
  if(_f.mgr)a=a.filter(r=>r.mgr===_f.mgr);
  if(_f.special==='noMgr')a=a.filter(isNoMgr);
  if(_f.special==='noPlan')a=a.filter(isNoPlan);
  if(_f.special==='follow')a=a.filter(isFollowDue);
  if(_f.special==='hasProv')a=a.filter(r=>r.prov>0);
  if(_f.aging!==''&&_f.aging!=null)a=a.filter(r=>r.ar>0&&agingIdx(r)===_f.aging);
  if(_f.q){const q=_f.q.toLowerCase();a=a.filter(r=>((r.name||'')+(r.memo||'')+(r.mgr||'')+(r.payNote||'')).toLowerCase().indexOf(q)>=0);}
  const k=_f.sort,d=_f.dir;
  a.sort((x,y)=>{const a1=x[k],b1=y[k];if(typeof a1==='number'||typeof b1==='number')return d*((a1||0)-(b1||0));return d*String(a1||'').localeCompare(String(b1||''));});

}

const WO_ST={confirm:{l:'대손 확정(품의)',c:'#b91c1c',bg:'#fee2e2'},sue:{l:'소송 회수 추진',c:'#6d28d9',bg:'#ede9fe'},hold:{l:'보류(추심 지속)',c:'#b45309',bg:'#fef3c7'},skip:{l:'대상 제외',c:'#64748b',bg:'#f1f5f9'}};
let _woMode='list', _woF='';
function woOf(r){const e=EDITS[r.rid];return (e&&e.wo)||null;}
function woReasons(r){
  const mi=M.find(i=>i.rid===r.rid);const rs=[];
  if(mi&&mi.cls==='관리제외')rs.push('관리대상: 관리제외');
  if(/폐업/.test(r.name)||r.trait==='폐업')rs.push('거래처 폐업');
  if(/회수불가/.test(r.dueNote||''))rs.push('지급기일: 회수불가');
  if(/대손/.test(r.opinion||''))rs.push('실무의견: 대손');
  if(r.ar>0&&r.prov>=r.ar*0.999)rs.push('충당금 100%');
  if(/폐업/.test(r.mgr||''))rs.push('담당 대리점 폐업');
  const yrs=r.saleDate?Math.floor((new Date(RAW.asOf)-new Date(r.saleDate))/(365.25*864e5)):0;
  if(yrs>=5)rs.push(yrs+'년 경과');
  else if(yrs>=3&&r.type==='장기체납채권')rs.push(yrs+'년 경과');
  return rs;
}
// 우선순위 등급: 금융기관 자산건전성 5단계 분류(정상/요주의/고정/회수의문/추정손실) 관행을 차용해
// "사건 발생여부 + 충당금 커버율 + 최근 상환활동" 3요소로 손실처리 후보를 3등급으로 재분류.
function woTier(r){
  const mi=M.find(i=>i.rid===r.rid);
  const txt=((mi&&mi.basis)||'')+' '+(r.plan||'')+' '+(r.payNote||'');
  if(/분납|입금|완제/.test(txt))return{n:3,l:'요주의급',s:'활성 상환중·보류 권장',c:'#0369a1',bg:'#e0f2fe'};
  const hasEvent=/폐업/.test(r.name)||r.trait==='폐업'||r.trait==='도주'||(mi&&mi.cls==='관리제외');
  const fullProv=r.ar>0&&r.prov>=r.ar*0.999;
  if(hasEvent&&fullProv)return{n:1,l:'추정손실급',s:'최우선 손실처리',c:'#b91c1c',bg:'#fee2e2'};
  return{n:2,l:'회수의문급',s:'개별검토 필요',c:'#b45309',bg:'#fef3c7'};
}
function woCands(){
  return E.filter(r=>r.ar>0).map(r=>({r,rs:woReasons(r)})).filter(x=>{
    if(woOf(x.r))return true;  // 상태 지정된 건은 항상 표시
    const strong=x.rs.some(s=>/관리제외|폐업|회수불가|대손|충당금/.test(s));
    return strong||(x.r.type==='장기체납채권'&&x.rs.length>0);
  }).sort((a,b)=>(woTier(a.r).n-woTier(b.r).n)||(b.rs.length-a.rs.length)||(b.r.ar-a.r.ar));
}

function xlDate(v){
  if(v==null||v==='')return '';
  if(v instanceof Date)return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
  const s=String(v).trim();const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?m[1]+'-'+m[2]+'-'+m[3]:s;
}
function xlNum(v){if(v==null||v==='')return 0;const n=Number(String(v).replace(/,/g,''));return isNaN(n)?0:n;}
function xlStr(v){if(v==null)return '';if(v instanceof Date)return xlDate(v);return String(v).trim();}
// 주간시트 헤더명 → 필드 매핑
const HMAP={'구분':'no','거래처코드':'code','거래처 명':'name','거래처명':'name','사업자번호':'bizno','채권구분':'cls','시장 분류':'mkt','부서명':'dept','사업군 분류':'seg','매출일자':'saleDate','년도':'year','적요(매출 내용)':'memo','외화잔액':'fx','원화금액':'amt','수금일':'collDate','수금금액':'coll','감사/부실':'audit','대손처리':'bad','원화 미수채권금액':'ar','대손충당 설정률':'provRate','대손 충당금':'prov','잔존가':'residual','입금내역 및 특이사항':'payNote','경과년수':'elapsed','채권 특성 (TF)':'trait','채권 유형 (TF)':'type','담당자':'mgr','실무진 의견 (TF)':'opinion','지급 기일':'dueNote','향후 수금 계획 (담당자 및 소속부서장)':'plan'};
const NUMF=new Set(['fx','amt','coll','bad','ar','provRate','prov','residual']);
function parseWeeklySheet(ws){
  const g=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
  // 헤더행 탐색(거래처명 포함 행)
  let hi=-1;for(let i=0;i<Math.min(g.length,10);i++){const r=g[i]||[];if(r.some(c=>String(c||'').indexOf('거래처')>=0&&String(c||'').indexOf('코드')<0)&&r.some(c=>String(c||'')==='매출일자')){hi=i;break;}}
  if(hi<0)return null;
  const cols={};(g[hi]||[]).forEach((c,j)=>{const k=HMAP[String(c||'').trim()];if(k&&cols[k]===undefined)cols[k]=j;});
  if(cols.name===undefined||cols.amt===undefined)return null;
  const rows=[];
  for(let i=hi+1;i<g.length;i++){const r=g[i]||[];if(!xlStr(r[cols.name]))continue;
    const o={};
    Object.keys(HMAP).forEach(h=>{const f=HMAP[h];if(cols[f]===undefined){o[f]=NUMF.has(f)?0:'';return;}
      const v=r[cols[f]];
      o[f]=(f==='saleDate'||f==='collDate')?xlDate(v):NUMF.has(f)?xlNum(v):xlStr(v);});
    if(o.year)o.year=String(o.year).replace(/[^0-9.]/g,'').split('.')[0];
    rows.push(o);}
  return rows;
}
// 행단위 주간 변동(diff) — 파이썬 시드(ar_seed.py diff_weeks)와 동일 로직
function diffRows(prevRows,curRows,d,prevD){
  const pm={};prevRows.forEach(o=>pm[o.rid]=o);
  const cm={};curRows.forEach(o=>cm[o.rid]=o);
  const coll=[],red=[],neu=[],adj=[];
  let gone=Object.keys(pm).filter(r=>!cm[r]).map(r=>pm[r]);
  Object.keys(cm).forEach(r=>{
    const o=cm[r];let p=pm[r];
    if(!p){
      const sk=o.code+'|'+o.saleDate+'|'+String(Math.trunc(o.amt));
      const gi=gone.findIndex(x=>x.code+'|'+x.saleDate+'|'+String(Math.trunc(x.amt))===sk);
      if(gi>=0){p=gone[gi];gone.splice(gi,1);}
      else if(o.ar>0){neu.push({n:o.name,v:o.ar,m:o.memo,g:o.mgr,t:o.type});return;}
      else return;
    }
    if(p.ar>0&&o.ar===0)coll.push({n:o.name,v:p.ar,m:o.memo,g:o.mgr,t:o.type});
    else if(o.ar>0&&o.ar<p.ar)red.push({n:o.name,v:p.ar-o.ar,d0:o.ar,m:o.memo,g:o.mgr,t:o.type});
  });
  gone.forEach(o=>{if(o.ar>0)adj.push({n:o.name,v:o.ar,m:o.memo,g:o.mgr,t:o.type});});
  return {d,prev:prevD,coll,red,new:neu,adj,
    sumColl:coll.reduce((s,x)=>s+x.v,0)+red.reduce((s,x)=>s+x.v,0),
    sumNew:neu.reduce((s,x)=>s+x.v,0),
    sumAdj:adj.reduce((s,x)=>s+x.v,0)};
}
function onUpFile(file){
  if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:false});
      const wnames=wb.SheetNames.filter(n=>/^\d{6}$/.test(n)).sort();
      if(!wnames.length){document.getElementById('up-prev').innerHTML='<div class="editable-note">주간 시트(YYMMDD)를 찾지 못했습니다.</div>';return;}
      // 모든 주간 시트 → 집계+행단위 변동(diff), 최신 시트 → 상세
      const assignRid=rows=>{const seen={};rows.forEach(o=>{const b=rid(o.code+'|'+o.saleDate+'|'+String(Math.trunc(o.amt))+'|'+o.memo);const n=seen[b]||0;seen[b]=n+1;o.rid=n===0?b:b+'-'+n;});};
      const weekly=[],fileChanges=[];let latestRows=null,latestD='',prevRows=null,prevD='';
      wnames.forEach(sn=>{
        const rows=parseWeeklySheet(wb.Sheets[sn]);if(!rows)return;
        assignRid(rows);
        const d='20'+sn.slice(0,2)+'-'+sn.slice(2,4)+'-'+sn.slice(4,6);
        const types={};rows.forEach(o=>{const t=o.type||'미분류';types[t]=types[t]||{cnt:0,ar:0};types[t].cnt++;types[t].ar+=o.ar;});
        weekly.push({d,cnt:rows.length,amt:rows.reduce((s,o)=>s+o.amt,0),coll:rows.reduce((s,o)=>s+o.coll,0),bad:rows.reduce((s,o)=>s+o.bad,0),ar:rows.reduce((s,o)=>s+o.ar,0),prov:rows.reduce((s,o)=>s+o.prov,0),types});
        if(prevRows){const ch=diffRows(prevRows,rows,d,prevD);if(ch.coll.length||ch.red.length||ch.new.length||ch.adj.length)fileChanges.push(ch);}
        prevRows=rows;prevD=d;
        if(sn===wnames[wnames.length-1]){latestRows=rows;latestD=d;}
      });
      if(!latestRows){document.getElementById('up-prev').innerHTML='<div class="editable-note">주간 시트 파싱 실패 — 헤더 형식을 확인해주세요.</div>';return;}
      // 관리대상 시트(있으면)
      let mgmt=RAW.mgmt||{asOf:'',base:'',summary:{},items:[]};
      const mgName=wb.SheetNames.find(n=>n.indexOf('미수금_관리대상')===0);
      if(mgName){const mg=parseMgmtSheet(wb.Sheets[mgName],mgName,latestRows);if(mg)mgmt=mg;}
      // weekly·changes 병합(기존 이력 유지, 같은 날짜는 새 값)
      const wmap={};((RAW.weekly)||[]).forEach(x=>wmap[x.d]=x);weekly.forEach(x=>wmap[x.d]=x);
      const merged=Object.values(wmap).sort((a,b)=>a.d.localeCompare(b.d));
      const cmap={};((RAW.changes)||[]).forEach(x=>cmap[x.d]=x);fileChanges.forEach(x=>cmap[x.d]=x);
      const mergedCh=Object.values(cmap).sort((a,b)=>a.d.localeCompare(b.d));
      _up={asOf:latestD,updatedAt:today(),rows:latestRows,weekly:merged,changes:mergedCh,mgmt};
      const arSum=latestRows.reduce((s,o)=>s+o.ar,0);
      const prevAr=(RAW.weekly&&RAW.weekly.length)?RAW.weekly[RAW.weekly.length-1].ar:0;
      // 안전장치: 건수 급감(재무팀 파일 이상 가능성)·기준일 역행 경고
      const warns=[];
      if(RAW.rows&&latestRows.length<RAW.rows.length*0.95)warns.push('채권 건수가 현재('+RAW.rows.length+'건)보다 5% 이상 적습니다('+latestRows.length+'건) — 파일이 일부만 담겼는지 확인하세요.');
      if(latestD<((RAW&&RAW.asOf)||''))warns.push('파일의 최신 주간시트('+latestD+')가 현재 기준일('+RAW.asOf+')보다 과거입니다 — 적용 시 데이터가 되돌아갑니다.');
      _up._warns=warns;
      document.getElementById('up-prev').innerHTML=`
        <div class="card" style="background:#f8fafc;margin:0">
        <div class="sec">파싱 결과 미리보기</div>
        <div style="font-size:13px;line-height:1.9">
        기준일(최신 주간시트): <b>${latestD}</b> ${latestD<=((RAW&&RAW.asOf)||'')?'<span class="chip" style="background:#fee2e2;color:#b91c1c">현재 데이터와 같거나 이전 날짜</span>':'<span class="chip" style="background:#dcfce7;color:#15803d">신규</span>'}<br>
        채권: <b>${latestRows.length}건</b> · 미수잔액 <b>${eok2(arSum)}</b> (현재 ${eok2(prevAr)} → ${arSum-prevAr>=0?'+':''}${eok2(arSum-prevAr)})<br>
        주간 스냅샷: 파일 ${weekly.length}개 + 기존 병합 = <b>${merged.length}개</b> · 변동이력 <b>${mergedCh.length}건</b>${fileChanges.length?` (최신주 수금 ${fileChanges[fileChanges.length-1].coll.length+fileChanges[fileChanges.length-1].red.length}건 ${eok2(fileChanges[fileChanges.length-1].sumColl)} · 신규 ${fileChanges[fileChanges.length-1].new.length}건)`:''}<br>
        관리대상: ${mgName?('<b>'+mgmt.items.length+'건</b> (시트 '+esc(mgName)+' 갱신)'):'기존 유지 ('+mgmt.items.length+'건)'}
        </div>
        ${_up._warns.length?`<div class="editable-note" style="background:#fef2f2;border-color:#fecaca;color:#b91c1c;margin-top:10px">${_up._warns.map(w2=>'⚠ '+esc(w2)).join('<br>')}</div>`:''}
        <div style="margin-top:12px"><button class="btn warn" onclick="applyUpload()">✓ 이 내용으로 갱신 적용</button> <button class="btn" onclick="_up=null;render()">취소</button></div>
        </div>`;
    }catch(err){document.getElementById('up-prev').innerHTML='<div class="editable-note">파싱 오류: '+esc(err.message)+'</div>';}
  };
  rd.readAsArrayBuffer(file);
}
function parseMgmtSheet(ws,name,latestRows){
  try{
    const g=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    const grid=g.map(r=>(r||[]).map(c=>xlStr(c)));
    const mg={asOf:'',base:'',summary:{},items:[]};
    const tail=name.split('_').pop();if(/^\d{6}$/.test(tail))mg.asOf='20'+tail.slice(0,2)+'-'+tail.slice(2,4)+'-'+tail.slice(4,6);
    for(const row of grid){for(const c of row){const m=String(c).match(/기준일 (\d{4}-\d{2}-\d{2})/);if(m)mg.base=m[1];}}
    let hi=-1;grid.forEach((row,i)=>{if(hi<0&&row.indexOf('추천분류')>=0&&row.indexOf('거래처명')>=0)hi=i;});
    // 요약
    grid.forEach((row,i)=>{
      if(row.indexOf('관리제외')>=0&&row.indexOf('집중관리')>=0&&i+2<grid.length&&!mg.summary['관리제외']){
        const hidx={};row.forEach((c,j)=>{if(c)hidx[c]=j;});
        ['관리제외','집중관리','검토필요','관리대상 합계'].forEach(k=>{if(hidx[k]!==undefined)mg.summary[k]={cnt:xlNum(grid[i+1][hidx[k]]),ar:xlNum(grid[i+2][hidx[k]])};});
      }});
    if(hi<0)return null;
    const h=grid[hi];const col={};h.forEach((c,j)=>{if(c&&col[c]===undefined)col[c]=j;});
    const nn=s=>String(s||'').replace(/\([^)]*\)/g,'').replace(/\s/g,'');
    for(let i=hi+1;i<grid.length;i++){const row=grid[i];if(!row[col['거래처명']])continue;
      const it={no:row[col['No']],name:row[col['거래처명']],year:row[col['발생년도']]||'',elapsed:row[col['경과년수']]||'',ar:xlNum(row[col['미수금액(원)']]),mgr:row[col['담당자']]||'',state:row[col['현재상태']]||'',cls:row[col['추천분류']]||'',basis:row[col['분류 근거']]||'',opinion:row[col['관리 의견']]||''};
      let mo=latestRows.find(o=>String(Math.trunc(xlNum(o.no)||0))===String(Math.trunc(xlNum(it.no)||0))&&o.name===it.name);
      if(!mo)mo=latestRows.find(o=>o.name===it.name&&Math.abs(o.ar-it.ar)<1);
      if(!mo)mo=latestRows.find(o=>nn(o.name)===nn(it.name)&&Math.abs(o.ar-it.ar)<1);
      it.rid=mo?mo.rid:'';
      mg.items.push(it);}
    return mg.items.length?mg:null;
  }catch(e){return null;}
}
let _applying=false;
async function applyUpload(){
  if(!_up||_applying)return;
  if(_up._warns&&_up._warns.length&&!confirm('경고가 있습니다:\n\n'+_up._warns.join('\n')+'\n\n그래도 적용할까요?'))return;
  _applying=true;
  try{
    delete _up._warns;
    const payload=_up;
    const r=await _sb.from('cons_cache').upsert({key:'ar_kr',data:payload},{onConflict:'key'});
    if(r.error){toast('저장 실패: '+r.error.message);return;}
    RAW=payload;_up=null;applyEdits();toast('갱신 완료 ✓ 기준일 '+RAW.asOf);setView('home');
  }finally{_applying=false;}
}

// ═══ 상세/편집 모달 ═══
function openRow(ridv){
  const r=E.find(x=>x.rid===ridv);if(!r){toast('상세 데이터를 찾을 수 없습니다');return;}
  const mi=M.find(i=>i.rid===ridv);
  const ed=EDITS[ridv]||{};
  const F=(l,v)=>`<div class="fld"><label>${l}</label><div class="fv">${esc(v==null||v===''?'-':v)}</div></div>`;
  let h=`<div class="mhd"><div><h3>${esc(r.name)}</h3><div class="hint">${esc(r.saleDate)} · ${esc(r.memo)}</div></div><button class="x" onclick="closeModal()">✕</button></div><div class="mbody">`;
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${typeChip(r.type)}${mi?clsChip(mi.cls):''}${r._edited||ed.cls||ed.mgmtOp?'<span class="chip" style="background:#ecfdf5;color:#047857">사이트 수정됨'+(ed._by?' · '+esc(ed._by.split('@')[0])+' '+esc(ed._at||''):'')+'</span>':''}</div>`;
  h+='<div class="fgrid">'
    +F('원화금액',fmt(r.amt)+'원')+F('수금금액',fmt(r.coll)+'원'+(r.collDate?' ('+r.collDate+')':''))
    +F('미수채권금액',fmt(r.ar)+'원')+F('대손처리',fmt(r.bad)+'원')
    +F('대손충당금',fmt(r.prov)+'원')+F('경과년수',r.elapsed)
    +F('담당자',r.mgr)+F('거래처코드',r.code)
    +F('사업자번호',r.bizno)+F('채권 특성',r.trait)
    +F('지급기일',r.dueNote)+F('발생년도',r.year)
    +'</div>';
  if(mi)h+='<div class="fgrid">'+F('관리 분류근거',mi.basis)+'</div>';
  // 이 거래처의 다른 채권
  const rel=E.filter(x=>x.name===r.name&&x.rid!==r.rid);
  if(rel.length){
    const relAr=rel.reduce((s,x)=>s+x.ar,0);
    h+=`<div class="fld" style="margin-bottom:14px"><label>🔗 이 거래처의 다른 채권 ${rel.length}건 (잔액 합계 ${fmt(relAr)}원 · 본건 포함 ${fmt(relAr+r.ar)}원)</label>`
      +rel.sort((a,b)=>b.ar-a.ar).slice(0,8).map(x=>`<div style="display:flex;gap:8px;align-items:center;padding:4px 0;font-size:12.5px;cursor:pointer" onclick="openRow('${x.rid}')"><span style="color:var(--muted);width:80px;flex-shrink:0">${esc(x.saleDate)}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.memo)}</span>${typeChip(x.type)}<b style="color:${x.ar>0?'#b45309':'var(--muted)'}">${fmt(x.ar)}</b></div>`).join('')
      +(rel.length>8?`<div class="hint">외 ${rel.length-8}건 — 목록에서 거래처별 보기</div>`:'')+'</div>';
  }
  // 수금 활동 이력
  const log=(EDITS[ridv]&&EDITS[ridv].log)||[];
  if(log.length){
    h+=`<div class="fld" style="margin-bottom:14px"><label>🕘 수금 활동 이력 ${log.length}건</label>`
      +log.slice().reverse().map(x=>`<div style="display:flex;gap:8px;padding:5px 0;font-size:12.5px;border-bottom:1px dashed var(--line)"><span style="color:var(--muted);width:80px;flex-shrink:0">${esc(x.d)}</span><span style="flex:1;color:var(--ink)">${esc(x.t)}</span><span class="hint">${esc((x.by||'').split('@')[0])}</span></div>`).join('')+'</div>';
  }
  h+='<div class="editable-note">✏️ 아래 항목은 수정 가능합니다. 저장 시 원본과 별도로 보관되어, 엑셀 재업로드 후에도 유지됩니다.</div>';
  h+=`<div class="fgrid" style="grid-template-columns:1fr 1fr">
    <div class="fld"><label>채권유형</label><select id="ed-type">${TYPE_ORDER.map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
    ${mi?`<div class="fld"><label>관리 분류</label><select id="ed-cls">${['집중관리','검토필요','관리제외'].map(c=>`<option ${mi.cls===c?'selected':''}>${c}</option>`).join('')}</select></div>`:''}
    <div class="fld"><label>다음 조치일 <span class="hint">(도래 시 대시보드 팔로우업에 표시)</span></label><input type="date" id="ed-nextDate" value="${esc(r.nextDate||'')}"></div>
    <div class="fld"><label>다음 조치 내용</label><input id="ed-nextAct" value="${esc(r.nextAct||'')}" placeholder="예: 분납 재약정 통화"></div>
  </div>
  <div class="fld" style="margin-bottom:10px"><label>➕ 활동 기록 추가 <span class="hint">(저장 시 오늘 날짜·작성자로 이력에 쌓임)</span></label><textarea id="ed-log" placeholder="예: 원장 통화 — 7월 말 500만원 입금 약속"></textarea></div>
  <div class="fld" style="margin-bottom:10px"><label>향후 수금 계획</label><textarea id="ed-plan">${esc(r.plan)}</textarea></div>
  <div class="fld" style="margin-bottom:10px"><label>입금내역 · 특이사항</label><textarea id="ed-payNote">${esc(r.payNote)}</textarea></div>
  <div class="fld" style="margin-bottom:10px"><label>실무진 의견</label><textarea id="ed-opinion">${esc(r.opinion)}</textarea></div>
  ${mi?`<div class="fld" style="margin-bottom:10px"><label>관리 의견</label><textarea id="ed-mgmtOp">${esc(mi.opinion)}</textarea></div>`:''}
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
    ${EDITS[ridv]?'<button class="btn" onclick="resetEdit(\''+ridv+'\')">↩ 원본 복원</button>':''}
    <button class="btn" onclick="closeModal()">닫기</button>
    <button class="btn pri" onclick="saveEdit('${ridv}')">저장</button>
  </div></div>`;
  document.getElementById('mbox').innerHTML=h;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
async function saveEdit(ridv){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():undefined;};
  const r=(RAW.rows||[]).find(x=>x.rid===ridv)||{};
  const mi=((RAW.mgmt&&RAW.mgmt.items)||[]).find(i=>i.rid===ridv);
  const e=Object.assign({},EDITS[ridv]||{});
  const set=(k,v,orig)=>{if(v===undefined)return;if(v===String(orig==null?'':orig).trim()){delete e[k];}else{e[k]=v;}};
  set('type',g('ed-type'),r.type);set('plan',g('ed-plan'),r.plan);set('payNote',g('ed-payNote'),r.payNote);set('opinion',g('ed-opinion'),r.opinion);
  set('nextDate',g('ed-nextDate'),'');set('nextAct',g('ed-nextAct'),'');
  if(mi){set('cls',g('ed-cls'),mi.cls);set('mgmtOp',g('ed-mgmtOp'),mi.opinion);}
  const logTxt=g('ed-log');
  if(logTxt){e.log=(e.log||[]).concat([{d:today(),by:ME,t:logTxt}]);}
  if(e.log&&!e.log.length)delete e.log;
  const keys=Object.keys(e).filter(k=>k[0]!=='_');
  if(!keys.length){delete EDITS[ridv];}
  else{e._by=ME;e._at=today();EDITS[ridv]=e;}
  const res=await _sb.from('cons_cache').upsert({key:'ar_kr_edits',data:EDITS},{onConflict:'key'});
  if(res.error){toast('저장 실패: '+res.error.message);return;}
  applyEdits();closeModal();render();toast('저장됨 ✓');
}
async function resetEdit(ridv){
  if(!EDITS[ridv])return closeModal();
  if(!confirm('이 채권의 사이트 수정분을 지우고 엑셀 원본으로 되돌릴까요?'))return;
  delete EDITS[ridv];
  const res=await _sb.from('cons_cache').upsert({key:'ar_kr_edits',data:EDITS},{onConflict:'key'});
  if(res.error){toast('실패: '+res.error.message);return;}
  applyEdits();closeModal();render();toast('복원됨');
}

boot();
